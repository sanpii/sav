[package]
name = "sav"
version = "0.1.0"
authors = ["Sanpi <sanpi@homecomputing.fr>"]
edition = "2018"
license = "MIT"

[dependencies]
mime = "0.3"
multipart = "0.18"
rocket = "0.5.0-rc.1"
serde = "1.0"
serde_derive = "1.0"
tera = "1.5"
tera-hot = "0.3"
thiserror = "1.0"

[dependencies.chrono]
version = "0.4"
features = ["serde"]

[dependencies.rocket_sync_db_pools]
version = "0.1.0-rc.1"

[dependencies.rocket_dyn_templates]
version = "0.1.0-rc.1"
features = ["tera"]

[dependencies.elephantry]
version = "2.1"
features = ["date", "rocket", "serde"]

[dependencies.elephantry-extras]
version = "0.2"
features = ["serde", "tera"]
